<style>

    input, select { padding: 8px; border: 1px solid #ced4da; border-radius: 5px; font-size: 12px; }

    .notice-top { font-size: 11px; color: #666; margin: -5px 0 15px; text-align: center; line-height: 1.5; background: #fff5f0; padding: 5px; border-radius: 4px; }

    .view-tabs { 
        display: flex; 
        justify-content: flex-end; 
        gap: 5px; 
        margin-bottom: 10px; 
        align-items: center;  /* 추가된 부분 */
        width: 100%;          /* 추가된 부분 */
    }
    .view-tabs button { background: #ddd; color: #333; font-size: 12px; }
    .view-tabs button.active { background: var(--primary); color: white; }

    #specialButtons button:hover {
        filter: brightness(90%);
        transition: 0.2s;
    }

    table { border-collapse: collapse; width:100%; table-layout: fixed; background: white; }
    th, td { border: 1px solid var(--border); text-align: center; font-size: 11px;}
    th { background: #f8f9fa; padding: 10px 0; }

    /* 3. [왼쪽] 오늘의 현황 테이블 전용 (#todayTable) */
    #todayTable td { padding: 6px 0;}

    .reserved { background-color: #fff9db !important; font-weight: bold; color: #856404; cursor: pointer; }
    .highlight-col { background-color: #fffaf0 !important; border-left: 2px dashed var(--primary) !important; border-right: 2px dashed var(--primary) !important; }
    th.highlight-col { border-top: 2px dashed var(--primary) !important; color: var(--primary); }
    tr:last-child td.highlight-col {border-bottom: 2px dashed var(--primary) !important;}
    
    /* 📅 월간 캘린더 레이아웃 수정 */

        background: white; 
        height: 120px;        /* 👈 높이를 110~120px 정도로 고정 (원하는 만큼 조절) */
        padding: 8px; 
        display: flex; 
        flex-direction: column; 
        cursor: pointer; 
        box-sizing: border-box;
        border: 1px solid transparent; 
        overflow-y: auto;     /* 👈 내용이 넘치면 이 칸 안에서만 스크롤 발생 */

    .month-day::-webkit-scrollbar {
        width: 4px; /* 스크롤바 두께 */
    }

        background-color: rgba(0, 0, 0, 0.1); /* 스크롤바 색상 (연하게) */
        border-radius: 10px;
    }
    
    .month-day::-webkit-scrollbar-track {
        background: transparent; /* 배경은 투명하게 */
    }

        border: 2px dashed var(--primary) !important;

        z-index: 2;
    }

    .other-month { background: #fafafa; color: #ccc; }

    .tarot-back { background: #2e2e4e; color: #ffd700; }
    .tarot-front { background: white; color: #333; transform: rotateY(180deg); background-size: cover; background-position: center; }

function showZodiac() {
    const grid = document.getElementById('zodiacGrid');
    const dateTitle = document.getElementById('zodiacDate');
    const now = new Date();
    
    // 날짜 표시
    dateTitle.innerText = `${now.getMonth()+1}월 ${now.getDate()}일`;
    grid.innerHTML = '';
    
    // 날짜 기반 시드 (매일 바뀌게 함)
    const daySeed = now.getFullYear() + now.getMonth() + now.getDate();

    zodiacConfig.forEach((item) => {
        let cardHtml = `
            <div style="border: 2px solid #f0f0f0; padding: 12px; border-radius: 12px; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.03);">

            const fortuneIdx = (daySeed + yIdx + item.animal.length) % item.pool.length;

// 💡 날짜 로컬 변환 함수 (하루 밀림 방지 핵심)
function getDS(d) {
    const date = new Date(d);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

async function cleanupOldData() {
    const today = new Date();
    const limitDate = new Date(today.setDate(today.getDate() - 30));
    const limitStr = getDS(limitDate);
    const snap = await db.ref('reservations').once('value');
    const data = snap.val();
    if (data) {
        Object.entries(data).forEach(([key, val]) => {
            if (val.date < limitStr) db.ref('reservations/' + key).remove();
        });
    }
}

async function commitReservation(data) {
    const { room, date, targetSlots, name, pw, gid } = data;

function setView(mode) {
    viewMode = mode;
    document.getElementById('btnWeek').classList.toggle('active', mode==='week');
    document.getElementById('btnMonth').classList.toggle('active', mode==='month');
    document.getElementById('weekView').style.display = mode==='week' ? 'block' : 'none';
    document.getElementById('monthContainer').style.display = mode==='month' ? 'flex' : 'none';
    render();
}

function render() {
    const rName = ROOMS[roomIdx];
    document.getElementById('roomName').innerText = rName;
    document.getElementById('subRoom').innerText = rName;
    renderToday(rName);
    if(viewMode === 'week') renderWeek(rName);
    else renderMonth(rName);
}

function renderToday(room) {
    const selDate = document.getElementById('resDate').value;
    const tbody = document.querySelector('#todayTable tbody');
    tbody.innerHTML = '';
    SLOTS.slice(0, -1).forEach(t => {
        const found = reservations.find(r => r.date === selDate && r.time === t && r.room === room);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${t}</td><td class="${found?'reserved':''}">${found?found.name:''}</td>
                        <td>${found?`<button style="padding:2px 5px; font-size:10px; background:#ff4d4f;" onclick="delRes('${found.key}')">X</button>`:''}</td>`;
        tbody.appendChild(tr);
    });
}

function renderWeek(room) {
    const start = getStartOfWeek(currentBaseDate);
    const todayStr = getDS(new Date());
    const days = [];
    for(let i=0; i<7; i++) days.push(new Date(start.getFullYear(), start.getMonth(), start.getDate() + i));
    document.getElementById('currentViewRange').innerText = `${days[0].getMonth()+1}.${days[0].getDate()} ~ ${days[6].getMonth()+1}.${days[6].getDate()}`;
    
    let html = `<thead><tr><th style="width:60px;">시간</th>`;
    days.forEach(d => {
        const dStr = getDS(d);
        const isSelected = dStr === document.getElementById('resDate').value;
        const isToday = dStr === todayStr;
        const dayLabel = `${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})${isToday ? '<br><span style="font-size:9px; color:var(--primary); font-weight:bold;">(오늘)</span>' : ''}`;
        html += `<th class="${isSelected?'highlight-col':''}">${dayLabel}</th>`;
    });
    html += `</tr></thead><tbody>`;

    SLOTS.slice(0, -1).forEach((t) => {
        html += `<tr><td style="background:#f8f9fa; font-weight:bold;">${t}</td>`;
        days.forEach(d => {
            const dStr = getDS(d);
            const isSelected = dStr === document.getElementById('resDate').value;
            const found = reservations.find(r => r.date === dStr && r.time === t && r.room === room);
            html += `<td class="${found?'reserved':''} ${isSelected?'highlight-col':''}" onclick="${found?`delRes('${found.key}')`:`quickRes('${dStr}','${t}')`}">${found?found.name:''}</td>`;
        });
        html += `</tr>`;
    });
    document.getElementById('weekTable').innerHTML = html + `</tbody>`;
}

function renderMonth(room) {
    const container = document.getElementById('monthView');
    container.innerHTML = '';
    const y = currentBaseDate.getFullYear();
    const m = currentBaseDate.getMonth();
    const todayStr = getDS(new Date());
    const selDate = document.getElementById('resDate').value;
    document.getElementById('currentViewRange').innerText = `${y}년 ${m+1}월`;
    
    const firstDay = new Date(y, m, 1);
    const startDay = new Date(y, m, 1 - firstDay.getDay()); 

    for(let i=0; i<42; i++) {
        const d = new Date(startDay.getFullYear(), startDay.getMonth(), startDay.getDate() + i);
        const dStr = getDS(d);
        const isSelected = dStr === selDate;
        const isToday = dStr === todayStr;
        const isOtherMonth = d.getMonth() !== m;
        
        const dayDiv = document.createElement('div');
        dayDiv.className = `month-day ${isOtherMonth?'other-month':''} ${isSelected?'highlight-col':''}`;
        if(isToday) dayDiv.style.backgroundColor = "#fff9db";

        dayDiv.onclick = () => { 
            document.getElementById('resDate').value = dStr; 
            currentBaseDate = new Date(d); 
            render(); 
        };
        
        const dayRes = reservations.filter(r => r.date === dStr && r.room === room).sort((a,b)=>a.time.localeCompare(b.time));
        let resHtml = dayRes.map(r => `<div class="res-item">${r.time} ${r.name}</div>`).join('');
        dayDiv.innerHTML = `
            <span class="day-num" style="${d.getDay()===0?'color:red;':d.getDay()===6?'color:blue;':''}">
                ${d.getDate()}${isToday?' <small style="color:var(--primary)">(오늘)</small>':''}
            </span>
            <div class="month-res-list">${resHtml}</div>`;
        container.appendChild(dayDiv);
    }
}

async function delRes(key) {
    const target = reservations.find(r => r.key === key);
    if(!target) return;

    const pw = prompt("비밀번호를 입력하세요.");
    if(!pw) return; // 취소 버튼을 눌렀을 때 대비

    // 관리자 마스터 비밀번호 설정
    const adminMasterPw = "rlghlrxla123@@";

    // 사용자가 입력한 비번이 원래 비번과 같거나, 관리자 비번과 같을 때만 통과
    if (pw === target.pw || pw === adminMasterPw) {
        const related = reservations.filter(r => r.gid === target.gid && r.room === target.room);
        
        const confirmMsg = pw === adminMasterPw 
            ? "[관리자 권한] 해당 그룹의 모든 예약을 삭제하시겠습니까?" 
            : "예약을 삭제하시겠습니까?";

        if(!confirm(confirmMsg)) return;

        // 관련 예약 모두 삭제
        for(let item of related) {
            await db.ref('reservations/' + item.key).remove();
        }
        
        alert("삭제가 완료되었습니다.");
    } else {
        alert("비밀번호가 일치하지 않습니다.");
    }
}

function syncFromInput() { currentBaseDate = new Date(document.getElementById('resDate').value); render(); }
function goToday() { currentBaseDate = new Date(); document.getElementById('resDate').value = getDS(currentBaseDate); render(); }
function changeDate(n) { 
    if(viewMode === 'week') currentBaseDate.setDate(currentBaseDate.getDate() + (n * 7));
    else currentBaseDate.setMonth(currentBaseDate.getMonth() + n);
    document.getElementById('resDate').value = getDS(currentBaseDate);
    render(); 
}
function quickRes(d, t) { document.getElementById('resDate').value = d; document.getElementById('startT').value = t; syncEndTime(); currentBaseDate = new Date(d); render(); }
function syncEndTime() {
    const sIdx = SLOTS.indexOf(document.getElementById('startT').value);
    const endSel = document.getElementById('endT');
    endSel.innerHTML = '';
    SLOTS.slice(sIdx+1).forEach(t => { let opt = document.createElement('option'); opt.value=t; opt.innerText=t; endSel.appendChild(opt); });
}
function changeRoom(n) { roomIdx = (roomIdx+n+ROOMS.length)%ROOMS.length; render(); }
function getStartOfWeek(d) {
    const dd = new Date(d);
    const day = dd.getDay();
    const diff = dd.getDate() - day + (day === 0 ? -6 : 1); // 월요일 기준
    return new Date(dd.setDate(diff));
}

/* --- 지뢰찾기 게임 관련 변수 및 설정 --- */
let mineBoard = [];      // 지뢰 및 숫자 정보를 담을 배열
let revealedCount = 0;   // 사용자가 연 칸의 개수
const gridSize = 4;      // 4x4 격자 크기
const mineCount = 3;     // 숨겨진 지뢰 개수 (난이도 조절 가능)

/**
 * 지뢰찾기 게임 초기화 및 시작
 */
function initMinesweeper() {
    const boardElement = document.getElementById('gameBoard');
    if (!boardElement) return;

    boardElement.innerHTML = ''; // 기존 보드 초기화
    mineBoard = Array(gridSize * gridSize).fill(0); // 0으로 가득 찬 16칸 생성
    revealedCount = 0; // 카운트 초기화

    // 1. 지뢰(M) 무작위 배치
    let plantedMines = 0;
    while (plantedMines < mineCount) {
        let index = Math.floor(Math.random() * (gridSize * gridSize));
        if (mineBoard[index] !== 'M') {
            mineBoard[index] = 'M';
            plantedMines++;
        }
    }

    // 2. 주변 지뢰 개수 계산 (숫자 채우기)
    for (let i = 0; i < gridSize * gridSize; i++) {
        if (mineBoard[i] === 'M') continue;
        
        let count = 0;
        const r = Math.floor(i / gridSize);
        const c = i % gridSize;

        // 인접한 8개 칸 검사
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                const nr = r + dr;
                const nc = c + dc;
                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    if (mineBoard[nr * gridSize + nc] === 'M') count++;
                }
            }
        }
        mineBoard[i] = count;
    }

    // 3. 화면에 칸 생성 및 이벤트 연결
    mineBoard.forEach((val, idx) => {
        const cell = document.createElement('div');
        // 디자인 설정
        cell.style.cssText = `
            width: 50px; 
            height: 50px; 
            background: #eee; 
            line-height: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            transition: 0.2s; 
            user-select: none;
        `;

        // [우클릭] 깃발 토글 기능
        cell.oncontextmenu = (e) => {
            e.preventDefault(); // 기본 메뉴 안 뜨게 방지
            if (cell.style.background === "rgb(255, 255, 255)") return; // 이미 열린 칸은 무시

            if (cell.innerText === "🚩") {
                cell.innerText = "";
            } else {
                cell.innerText = "🚩";
                cell.style.color = "red";
            }
        };

        // [좌클릭] 칸 열기 기능
        cell.onclick = () => {
            if (cell.innerText === "🚩") return; // 깃발 꽂힌 칸은 클릭 방지
            if (cell.style.background === "rgb(255, 255, 255)") return; // 이미 열린 칸 클릭 무시

            if (val === 'M') {
                // 지뢰를 밟았을 때
                cell.style.background = "#ff6b6b";
                cell.innerText = "💣";
                setTimeout(() => { 
                    alert("펑! 지뢰를 밟았습니다. 다시 도전해보세요!"); 
                    initMinesweeper(); 
                }, 100);
            } else {
                // 안전한 칸을 열었을 때
                cell.style.background = "#fff";
                cell.style.border = "1px solid #ddd";
                cell.innerText = val === 0 ? "" : val;
                
                // 숫자별 색상 지정
                if (val === 1) cell.style.color = "blue";
                else if (val === 2) cell.style.color = "green";
                else if (val >= 3) cell.style.color = "red";
                
                revealedCount++;

                // 승리 조건 체크
                if (revealedCount === (16 - mineCount)) {
                    setTimeout(async () => {
                        alert("🎉 지뢰를 모두 찾았습니다! 예약이 진행됩니다.");
                        
                        if (tempResData) {
                            await commitReservation(tempResData); // 보관했던 데이터로 저장 실행
                            tempResData = null; // 데이터 비우기
                        }
                        
                        closeGame(); // 게임 모달 닫기
                    }, 100);
                }
            }
        };
        boardElement.appendChild(cell);
    });
}

/**
 * 게임 모달 닫기
 */
function closeGame() {
    const modal = document.getElementById('gameModal');
    if (modal) modal.style.display = 'none';
}
