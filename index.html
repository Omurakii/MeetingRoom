<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아워홈 R&D 회의실 통합 예약 시스템</title>
<style>
    :root { --primary: #e76115; --bg: #f4f7f9; --border: #e0e4e8; }
    body { font-family: 'Malgun Gothic', sans-serif; padding:15px; display:flex; gap:15px; background-color: var(--bg); color: #333; margin: 0; height: 100vh; box-sizing: border-box; }
    
    /* 레이아웃 */
    .left { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
    .right { flex: 3; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }

    /* 공통 버튼 & 입력 */
    button { cursor: pointer; background-color: var(--primary); color: white; border: none; border-radius: 5px; padding: 8px 12px; font-weight: bold; transition: 0.2s; }
    button:hover { opacity: 0.8; }
    input, select { padding: 8px; border: 1px solid #ced4da; border-radius: 5px; font-size: 12px; }

    /* 상단 회의실 선택기 */
    .room-selector { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #f0f0f0; padding: 8px; border-radius: 8px; }
    .room-selector span { font-size: 16px; font-weight: bold; color: var(--primary); min-width: 100px; text-align: center; }

    /* 뷰 전환 탭 */
    .view-tabs { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
    .view-tabs button { background: #ddd; color: #333; font-size: 12px; }
    .view-tabs button.active { background: var(--primary); color: white; }

    /* 테이블 공통 */
    table { border-collapse: collapse; width:100%; table-layout: fixed; background: white; }
    th, td { border: 1px solid var(--border); text-align: center; font-size: 11px; }
    th { background: #f8f9fa; padding: 10px 0; }
    
    /* 💡 주간 캘린더 행 높이 복구 */
    #weekTable td { height: 40px; } 
    
    .reserved { background-color: #fff9db !important; font-weight: bold; color: #856404; cursor: pointer; }
    .highlight-col { background-color: #fffaf0; border-left: 2px dashed var(--primary); border-right: 2px dashed var(--primary); }
    .today-marker { color: var(--primary); font-weight: bold; }

    /* 월간 캘린더 전용 */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); flex: 1; overflow-y: auto; }
    .month-day { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 110px; padding: 5px; background: white; display: flex; flex-direction: column; cursor: pointer; }
    .month-day:hover { background: #f9f9f9; }
    .month-day.other-month { background: #fcfcfc; color: #ccc; }
    .month-day.is-today { background: #fff0e6; }
    .day-num { font-weight: bold; margin-bottom: 5px; display: block; }
    .month-res-list { flex: 1; overflow-y: auto; font-size: 10px; display: flex; flex-direction: column; gap: 2px; }
    .res-item { background: #ffeeba; padding: 2px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid var(--primary); margin-bottom: 1px; }

    /* 스크롤 영역 */
    .scroll-area { flex: 1; overflow-y: auto; border-bottom: 1px solid var(--border); }
    .btn-today { background-color: #555 !important; }
</style>
</head>
<body>

<div class="left">
  <div class="room-selector">
    <button onclick="changeRoom(-1)">◀</button>
    <span id="roomName">Fresh</span>
    <button onclick="changeRoom(1)">▶</button>
  </div>
  
  <h2 style="font-size: 18px; margin: 0 0 10px; text-align:center;">🏢 회의실 예약</h2>
  <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
    <input type="date" id="resDate">
    <div style="display:flex; gap:4px;">
        <select id="startT" style="flex:1;" onchange="syncEndTime()"></select>
        <select id="endT" style="flex:1;"></select>
    </div>
    <div style="display: flex; gap: 4px;">
        <input type="text" id="resName" placeholder="예약자 성함" style="flex: 1.5;">
        <input type="password" id="resPw" placeholder="비번(4자리)" maxlength="4" style="flex: 1;">
    </div>
    <button onclick="addRes()">예약하기</button>
  </div>
  
  <hr style="border:0; border-top:1px solid #eee;">
  <h4 style="margin: 10px 0 5px; font-size:13px;">오늘의 <span id="subRoom"></span> 현황</h4>
  <div class="scroll-area">
      <table id="todayTable">
        <thead><tr><th style="width:50px;">시간</th><th>예약자</th><th style="width:40px;">-</th></tr></thead>
        <tbody></tbody>
      </table>
  </div>
</div>

<div class="right">
  <div class="view-tabs">
    <button id="btnWeek" class="active" onclick="setView('week')">주간</button>
    <button id="btnMonth" onclick="setView('month')">월간</button>
  </div>

  <div class="week-nav" style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:10px;">
    <button class="btn-today" onclick="goToday()">오늘</button>
    <button onclick="changeDate(-1)">◀ 이전</button>
    <h3 id="currentViewRange" style="margin:0; font-size:16px; min-width:180px; text-align:center;"></h3>
    <button onclick="changeDate(1)">다음 ▶</button>
  </div>

  <div id="weekView" class="scroll-area">
      <table id="weekTable"></table>
  </div>

  <div id="monthView" class="month-grid" style="display:none;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCenJeE0f4-7SuAD-BHwqy3st0Y2LcAHjg",
  authDomain: "meeting-room-9382e.firebaseapp.com",
  databaseURL: "https://meeting-room-9382e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-room-9382e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ROOMS = ["Fresh", "Innovation", "Healthy"];
let roomIdx = 0;
let viewMode = 'week'; 
let currentBaseDate = new Date(); 

const SLOTS = [];
for(let h=8; h<=17; h++) {
    for(let m of ["00","30"]) { if(h===8 && m==="00") continue; SLOTS.push(`${String(h).padStart(2,'0')}:${m}`); }
}
SLOTS.push("18:00");

let reservations = [];

document.addEventListener("DOMContentLoaded", () => {
    SLOTS.slice(0, -1).forEach(t => {
        let opt = document.createElement('option'); opt.value = t; opt.innerText = t;
        document.getElementById('startT').appendChild(opt);
    });
    syncEndTime();
    
    const todayStr = getDS(new Date());
    document.getElementById('resDate').value = todayStr;
    document.getElementById('resDate').onchange = (e) => {
        currentBaseDate = new Date(e.target.value);
        render();
    };

    db.ref('reservations').on('value', snap => {
        const data = snap.val();
        reservations = data ? Object.entries(data).map(([k,v]) => ({key:k, ...v})) : [];
        autoCleanup();
        render();
    });
});

function setView(mode) {
    viewMode = mode;
    document.getElementById('btnWeek').classList.toggle('active', mode==='week');
    document.getElementById('btnMonth').classList.toggle('active', mode==='month');
    document.getElementById('weekView').style.display = mode==='week' ? 'block' : 'none';
    document.getElementById('monthView').style.display = mode==='month' ? 'grid' : 'none';
    render();
}

function render() {
    const rName = ROOMS[roomIdx];
    document.getElementById('roomName').innerText = rName;
    document.getElementById('subRoom').innerText = rName;
    renderToday(rName);
    if(viewMode === 'week') renderWeek(rName);
    else renderMonth(rName);
}

function renderToday(room) {
    const selDate = document.getElementById('resDate').value;
    const tbody = document.querySelector('#todayTable tbody');
    tbody.innerHTML = '';
    SLOTS.slice(0, -1).forEach(t => {
        const found = reservations.find(r => r.date === selDate && r.time === t && r.room === room);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${t}</td><td class="${found?'reserved':''}">${found?found.name:''}</td>
                        <td>${found?`<button style="padding:2px 5px; font-size:10px; background:#ff4d4f; border:none; color:white; border-radius:3px; cursor:pointer;" onclick="delRes('${found.key}')">X</button>`:''}</td>`;
        tbody.appendChild(tr);
    });
}

function renderWeek(room) {
    const start = getStartOfWeek(currentBaseDate);
    const days = [];
    for(let i=0; i<7; i++) { const d = new Date(start); d.setDate(d.getDate()+i); days.push(d); }
    
    document.getElementById('currentViewRange').innerText = `${days[0].getMonth()+1}.${days[0].getDate()} ~ ${days[6].getMonth()+1}.${days[6].getDate()}`;
    
    let html = `<thead><tr><th style="width:60px;">시간</th>`;
    days.forEach(d => {
        const dStr = getDS(d);
        const isToday = dStr === getDS(new Date());
        const isSelected = dStr === document.getElementById('resDate').value;
        html += `<th class="${isSelected?'highlight-col':''} ${isToday?'today-marker':''}">
                    ${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})${isToday?'<br>(오늘)':''}
                 </th>`;
    });
    html += `</tr></thead><tbody>`;

    SLOTS.slice(0, -1).forEach(t => {
        html += `<tr><td style="background:#f8f9fa; font-weight:bold;">${t}</td>`;
        days.forEach(d => {
            const dStr = getDS(d);
            const isSelected = dStr === document.getElementById('resDate').value;
            const found = reservations.find(r => r.date === dStr && r.time === t && r.room === room);
            html += `<td class="${found?'reserved':''} ${isSelected?'highlight-col':''}" 
                         onclick="${found?`delRes('${found.key}')`:`quickRes('${dStr}','${t}')`}">
                         ${found?found.name:''}
                     </td>`;
        });
        html += `</tr>`;
    });
    document.getElementById('weekTable').innerHTML = html + `</tbody>`;
}

function renderMonth(room) {
    const container = document.getElementById('monthView');
    container.innerHTML = '';
    const y = currentBaseDate.getFullYear();
    const m = currentBaseDate.getMonth();
    document.getElementById('currentViewRange').innerText = `${y}년 ${m+1}월`;

    const firstDay = new Date(y, m, 1);
    const startDay = new Date(firstDay);
    startDay.setDate(firstDay.getDate() - firstDay.getDay()); 

    for(let i=0; i<42; i++) {
        const d = new Date(startDay); d.setDate(startDay.getDate() + i);
        const dStr = getDS(d);
        const isToday = dStr === getDS(new Date());
        const isOtherMonth = d.getMonth() !== m;

        const dayDiv = document.createElement('div');
        dayDiv.className = `month-day ${isOtherMonth?'other-month':''} ${isToday?'is-today':''}`;
        dayDiv.onclick = () => { 
            document.getElementById('resDate').value = dStr; 
            currentBaseDate = new Date(dStr);
            render(); 
        };

        const dayRes = reservations.filter(r => r.date === dStr && r.room === room).sort((a,b)=>a.time.localeCompare(b.time));
        let resHtml = dayRes.map(r => `<div class="res-item" onclick="event.stopPropagation(); delRes('${r.key}')">${r.time} ${r.name}</div>`).join('');
        
        dayDiv.innerHTML = `<span class="day-num">${d.getDate()}</span><div class="month-res-list">${resHtml}</div>`;
        container.appendChild(dayDiv);
    }
}

async function addRes() {
    const date = document.getElementById('resDate').value;
    if(date < getDS(new Date())) return alert("오늘보다 이전 날짜입니다.");
    const name = document.getElementById('resName').value.trim();
    const pw = document.getElementById('resPw').value.trim();
    if(!name || pw.length<4) return alert("성함과 비번 4자리를 입력하세요.");

    const startIdx = SLOTS.indexOf(document.getElementById('startT').value);
    const endIdx = SLOTS.indexOf(document.getElementById('endT').value);
    const targetSlots = SLOTS.slice(startIdx, endIdx);
    const gid = Date.now();
    const room = ROOMS[roomIdx];

    for(let t of targetSlots) {
        if(reservations.find(r => r.date === date && r.time === t && r.room === room)) return alert("이미 중복된 예약이 있습니다.");
    }
    for(let t of targetSlots) {
        await db.ref('reservations').push({ room, date, time: t, name, pw, gid });
    }
    document.getElementById('resName').value=''; document.getElementById('resPw').value=''; alert("예약 완료");
}

async function delRes(key) {
    const target = reservations.find(r => r.key === key);
    if(!target) return;
    const pw = prompt("비밀번호 4자리를 입력하세요.");
    if(pw !== target.pw) return alert("비밀번호가 일치하지 않습니다.");

    const related = reservations.filter(r => r.gid === target.gid && r.room === target.room);
    if(!confirm(related.length>1 ? "연결된 전체 예약을 삭제하시겠습니까?" : "삭제하시겠습니까?")) return;

    for(let item of related) await db.ref('reservations/' + item.key).remove();
    alert("삭제되었습니다.");
}

function quickRes(d, t) { 
    document.getElementById('resDate').value = d; 
    document.getElementById('startT').value = t; 
    syncEndTime(); 
    render(); 
}

function syncEndTime() {
    const sIdx = SLOTS.indexOf(document.getElementById('startT').value);
    const endSel = document.getElementById('endT');
    endSel.innerHTML = '';
    SLOTS.slice(sIdx+1).forEach(t => { let opt = document.createElement('option'); opt.value=t; opt.innerText=t; endSel.appendChild(opt); });
}

function changeRoom(n) { roomIdx = (roomIdx+n+ROOMS.length)%ROOMS.length; render(); }
function changeDate(n) { 
    if(viewMode === 'week') currentBaseDate.setDate(currentBaseDate.getDate() + (n * 7));
    else currentBaseDate.setMonth(currentBaseDate.getMonth() + n);
    render(); 
}
function goToday() { 
    currentBaseDate = new Date(); 
    document.getElementById('resDate').value = getDS(currentBaseDate); 
    render(); 
}
function getDS(d) { return d.toISOString().split('T')[0]; }
function getStartOfWeek(d) { 
    const dd = new Date(d); 
    const day = dd.getDay(); 
    const diff = dd.getDate() - day + (day===0?-6:1); 
    return new Date(dd.setDate(diff)); 
}
async function autoCleanup() {
    const limit = getDS(new Date(Date.now() - 30*24*60*60*1000));
    const oldOnes = reservations.filter(r => r.date < limit);
    for(let r of oldOnes) await db.ref('reservations/'+r.key).remove();
}
</script>
</body>
</html>
