<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의실 예약</title>

<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
th { background:#f0f0f0; }
input, select, button { padding:6px; margin:4px; }
.reserved { background:#ffe58a; }
</style>
</head>

<body>

<h2>📅 회의실 예약 (공유 버전)</h2>

<label>날짜: <input type="date" id="date"></label>

<label>시간:
<select id="time">
<option>08:30</option><option>09:30</option><option>10:30</option>
<option>11:30</option><option>12:30</option><option>13:30</option>
<option>14:30</option><option>15:30</option><option>16:30</option>
</select>
</label>

<label>Fresh:
<select id="fresh">
<option value="">-</option>
<option>김철수</option><option>이영희</option><option>박민수</option>
</select>
</label>

<label>Innovation:
<select id="innovation">
<option value="">-</option>
<option>김철수</option><option>이영희</option><option>박민수</option>
</select>
</label>

<button onclick="addReservation()">예약</button>

<h3>📌 오늘 예약</h3>

<table id="todayTable">
<thead>
<tr><th>시간</th><th>Fresh</th><th>Innovation</th><th>관리</th></tr>
</thead>
<tbody></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// 🔥 너가 준 설정 그대로 적용
const firebaseConfig = {
  apiKey: "AIzaSyCenJeE0f4-7SuAD-BHwqy3st0Y2LcAHjg",
  authDomain: "meeting-room-9382e.firebaseapp.com",
  databaseURL: "https://meeting-room-9382e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-room-9382e",
  storageBucket: "meeting-room-9382e.firebasestorage.app",
  messagingSenderId: "443110031923",
  appId: "1:443110031923:web:9e3154876e475fc9225946",
  measurementId: "G-XRQPQCVZQ1"
};

// 초기화
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let reservations = [];

// 🔥 예약 추가
function addReservation() {
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const fresh = document.getElementById('fresh').value;
  const innovation = document.getElementById('innovation').value;

  if(!date) return alert('날짜 선택');

  db.ref('reservations').push({
    date, time, fresh, innovation
  });
}

// 🔥 삭제
function deleteReservation(key) {
  db.ref('reservations/' + key).remove();
}

// 🔥 실시간 데이터 받기 (핵심)
db.ref('reservations').on('value', snapshot => {
  const data = snapshot.val() || {};
  reservations = Object.entries(data).map(([key, value]) => ({ key, ...value }));
  renderToday();
});

// 🔥 화면 렌더링
function renderToday() {
  const today = new Date().toISOString().slice(0,10);
  const tbody = document.querySelector('#todayTable tbody');
  tbody.innerHTML = '';

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  times.forEach(t => {
    const row = document.createElement('tr');

    const found = reservations.find(r => r.date === today && r.time === t);

    if(found) row.classList.add('reserved');

    row.innerHTML = `
      <td>${t}</td>
      <td>${found?.fresh || ''}</td>
      <td>${found?.innovation || ''}</td>
      <td>${found ? `<button onclick="deleteReservation('${found.key}')">삭제</button>` : ''}</td>
    `;

    tbody.appendChild(row);
  });
}
</script>

</body>
</html>
