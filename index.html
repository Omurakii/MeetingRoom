<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회의실 예약 시스템</title>
<style>
    body { font-family: 'Malgun Gothic', sans-serif; padding:20px; display:flex; gap:20px; background-color: #f4f7f9; color: #333; }
    .left { flex:1.4; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); height: fit-content; }
    .right { flex:2.6; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    
    h2, h3 { margin-top: 0; color: #1a1a1a; }
    h4 { margin: 25px 0 10px 0; padding-left: 10px; border-left: 5px solid #007bff; font-size: 16px; }

    table { border-collapse: collapse; width:100%; margin-top: 10px; table-layout: fixed; background: white; }
    th, td { border: 1px solid #e0e4e8; text-align: center; height: 40px; font-size: 13px; transition: 0.2s; }
    th { background: #f8f9fa; font-weight: 600; color: #555; }
    
    .reserved { background-color: #fff9db !important; font-weight: bold; color: #856404; }
    td:hover { background-color: #f1f3f5; cursor: pointer; }

    .week-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .week-nav h3 { margin: 0; min-width: 160px; text-align: center; font-size: 18px; }

    button { cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 6px; padding: 10px 18px; font-weight: bold; transition: 0.3s; }
    button:hover { background-color: #0056b3; }
    
    /* 개별 삭제 버튼 스타일 */
    .btn-delete { background: #ff4d4f; padding: 4px 6px; font-size: 11px; border-radius: 4px; font-weight: normal; }
    .btn-delete:hover { background: #d32f2f; }

    input, select { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; margin-right: 5px; }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
</style>
</head>
<body>

<div class="left">
  <h2>📅 회의실 예약</h2>
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <div style="display: flex; gap: 5px;">
        <input type="date" id="date" style="flex: 2;">
        <select id="time" style="flex: 1;">
            <option>08:30</option><option>09:30</option><option>10:30</option>
            <option>11:30</option><option>12:30</option><option>13:30</option>
            <option>14:30</option><option>15:30</option><option>16:30</option>
        </select>
    </div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="fresh" placeholder="Fresh 예약자" style="flex: 1;">
        <input type="text" id="innovation" placeholder="Innovation 예약자" style="flex: 1;">
    </div>
    <button onclick="addReservation()" style="width: 100%; margin-top: 5px;">예약하기</button>
  </div>
  
  <hr>
  <h3>선택 날짜 현황 (<span id="selectedDateDisplay"></span>)</h3>
  <table id="todayTable">
    <thead>
      <tr>
        <th style="width:60px;">시간</th>
        <th>Fresh</th>
        <th style="width:50px;">관리</th>
        <th>Innovation</th>
        <th style="width:50px;">관리</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="right">
  <div class="week-nav">
    <button onclick="prevWeek()">◀ 이전 주</button>
    <h3 id="weekLabel"></h3>
    <button onclick="nextWeek()">다음 주 ▶</button>
  </div>

  <h4>📍 Fresh 회의실</h4>
  <table id="freshWeekTable"></table>

  <h4>📍 Innovation 회의실</h4>
  <table id="innovationWeekTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCenJeE0f4-7SuAD-BHwqy3st0Y2LcAHjg",
  authDomain: "meeting-room-9382e.firebaseapp.com",
  databaseURL: "https://meeting-room-9382e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-room-9382e",
  storageBucket: "meeting-room-9382e.firebasestorage.app",
  messagingSenderId: "443110031923",
  appId: "1:443110031923:web:9e3154876e475fc9225946",
  measurementId: "G-XRQPQCVZQ1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let reservations = [];
let currentWeekStart = getStartOfWeek(new Date());

const el = {
    date: document.getElementById('date'),
    time: document.getElementById('time'),
    fresh: document.getElementById('fresh'),
    innovation: document.getElementById('innovation'),
    freshTable: document.getElementById('freshWeekTable'),
    innovationTable: document.getElementById('innovationWeekTable'),
    todayTbody: document.querySelector('#todayTable tbody'),
    weekLabel: document.getElementById('weekLabel'),
    dateDisplay: document.getElementById('selectedDateDisplay')
};

document.addEventListener("DOMContentLoaded", () => {
    const todayStr = getLocalDateString(new Date());
    el.date.value = todayStr;
    el.dateDisplay.innerText = todayStr;

    el.date.onchange = () => {
        el.dateDisplay.innerText = el.date.value;
        renderAll();
    };

    db.ref('reservations').on('value', snapshot => {
        const data = snapshot.val();
        reservations = data ? Object.entries(data).map(([k, v]) => ({ key: k, ...v })) : [];
        renderAll(); 
    });
});

function getLocalDateString(date) {
    const d = new Date(date);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function getStartOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
}

function renderAll() {
    renderSelectedDate();
    renderWeekTable();
}

// 좌측 목록: 회의실별 삭제 버튼 분리
function renderSelectedDate() {
    if (!el.todayTbody) return;
    el.todayTbody.innerHTML = '';
    const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

    times.forEach(t => {
        const found = reservations.find(r => r.date === el.date.value && r.time === t);
        const tr = document.createElement('tr');
        
        const freshName = found?.fresh || '';
        const innovName = found?.innovation || '';

        tr.innerHTML = `
            <td style="background:#f9f9f9; font-weight:bold;">${t}</td>
            <td class="${freshName ? 'reserved' : ''}">${freshName}</td>
            <td>${freshName ? `<button class="btn-delete" onclick="deleteRoomRes('${found.key}', 'fresh')">삭제</button>` : ''}</td>
            <td class="${innovName ? 'reserved' : ''}">${innovName}</td>
            <td>${innovName ? `<button class="btn-delete" onclick="deleteRoomRes('${found.key}', 'innovation')">삭제</button>` : ''}</td>
        `;
        el.todayTbody.appendChild(tr);
    });
}

// 예약 추가 로직
function addReservation() {
    const date = el.date.value;
    const time = el.time.value;
    const fresh = el.fresh.value.trim();
    const innovation = el.innovation.value.trim();

    if (!fresh && !innovation) return alert("예약자 이름을 입력해 주세요.");

    const existing = reservations.find(r => r.date === date && r.time === time);
    
    let newData = existing ? { ...existing } : { date, time, fresh: '', innovation: '' };
    
    // 입력된 값이 있는 경우에만 덮어쓰고, 없으면 기존 값 유지
    if (fresh) newData.fresh = fresh;
    if (innovation) newData.innovation = innovation;

    if (existing) db.ref('reservations/' + existing.key).remove();
    
    delete newData.key;
    db.ref('reservations').push(newData).then(() => {
        el.fresh.value = '';
        el.innovation.value = '';
    });
}

// 특정 회의실만 삭제하는 함수
function deleteRoomRes(key, type) {
    if (!confirm("해당 회의실 예약을 삭제하시겠습니까?")) return;
    
    const target = reservations.find(r => r.key === key);
    if (!target) return;

    let updateData = { ...target };
    if (type === 'fresh') updateData.fresh = '';
    else updateData.innovation = '';

    db.ref('reservations/' + key).remove();

    // 만약 양쪽 다 비게 되면 아예 삭제, 한쪽이라도 남으면 업데이트
    if (updateData.fresh || updateData.innovation) {
        delete updateData.key;
        db.ref('reservations').push(updateData);
    }
}

function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderAll(); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderAll(); }

function renderWeekTable() {
    if (!el.freshTable || !el.innovationTable) return;
    const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];
    const weekDays = ['일','월','화','수','목','금','토'];
    const days = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        days.push(d);
    }

    el.weekLabel.innerText = `${days[0].getMonth()+1}.${days[0].getDate()} ~ ${days[6].getMonth()+1}.${days[6].getDate()}`;

    const build = (target, type) => {
        let html = `<thead><tr><th style="width:60px;">시간</th>${days.map(d => `<th>${d.getDate()}(${weekDays[d.getDay()]})</th>`).join('')}</tr></thead><tbody>`;
        times.forEach(t => {
            html += `<tr><td style="background:#f8f9fa; font-weight:bold;">${t}</td>`;
            days.forEach(d => {
                const dateStr = getLocalDateString(d);
                const found = reservations.find(r => r.date === dateStr && r.time === t);
                const name = found ? (type === 'fresh' ? found.fresh : found.innovation) : '';
                const isReserved = name ? 'reserved' : '';
                html += `<td class="${isReserved}" onclick="clickCell('${dateStr}','${t}','${type}')">${name}</td>`;
            });
            html += `</tr>`;
        });
        target.innerHTML = html + `</tbody>`;
    };
    build(el.freshTable, 'fresh');
    build(el.innovationTable, 'innovation');
}

function clickCell(date, time, type) {
    const existing = reservations.find(r => r.date === date && r.time === time);
    const typeLabel = (type === 'fresh') ? 'Fresh' : 'Innovation';
    const currentName = existing ? (type === 'fresh' ? existing.fresh : existing.innovation) : '';
    
    const newName = prompt(`[${date} ${time}] ${typeLabel} 예약자명`, currentName || '');
    if (newName === null) return;

    let updateData = existing ? { ...existing } : { date, time, fresh: '', innovation: '' };
    if (type === 'fresh') updateData.fresh = newName.trim();
    else updateData.innovation = newName.trim();

    if (existing) db.ref('reservations/' + existing.key).remove();
    if (updateData.fresh || updateData.innovation) {
        delete updateData.key;
        db.ref('reservations').push(updateData);
    }
}
</script>
</body>
</html>
