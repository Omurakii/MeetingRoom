<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회의실 예약</title>

<style>
body { font-family: Arial; padding:20px; display:flex; gap:20px; }
.left { flex:2; }
.right { flex:1; }

table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; text-align:center; }

.left th, .left td { padding:8px; }
th { background:#f0f0f0; }

.reserved { background:#ffe58a; font-weight:bold; }
td { cursor:pointer; }

/* 우측 주간표 */
.right table {
  table-layout: fixed;
  width:100%;
  font-size:11px;
}

.right th, .right td {
  padding:2px;
  height:24px;
  overflow:hidden;
  white-space:nowrap;
}

.right th:first-child,
.right td:first-child {
  width:50px;
  font-size:10px;
}

.right th:not(:first-child),
.right td:not(:first-child) {
  width: calc((100% - 50px) / 7);
}

/* 툴팁 */
.tooltip { position:relative; }

.tooltip:hover::after {
  content: attr(data-tooltip);
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:4px 6px;
  font-size:10px;
  border-radius:4px;
  z-index: 10; /* 툴팁이 가려지지 않도록 수정 */
}

input, select, button { padding:6px; margin:4px; }
</style>
</head>

<body>

<div class="left">
<h2>📅 회의실 예약</h2>

<input type="date" id="date" onchange="renderSelectedDate()">
<select id="time">
<option>08:30</option><option>09:30</option><option>10:30</option>
<option>11:30</option><option>12:30</option><option>13:30</option>
<option>14:30</option><option>15:30</option><option>16:30</option>
</select>

<input type="text" id="fresh" placeholder="Fresh">
<input type="text" id="innovation" placeholder="Innovation">

<button onclick="addReservation()">예약</button>

<h3>선택 날짜</h3>
<table id="todayTable">
<thead>
<tr><th>시간</th><th>Fresh</th><th>Innovation</th><th>관리</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="right">
<h3>
<button onclick="prevWeek()">◀</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">▶</button>
</h3>

<h4>Fresh</h4>
<table id="freshWeekTable"></table>

<h4>Innovation</h4>
<table id="innovationWeekTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* Firebase 설정 (기존 정보 입력 필요) */
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "...",
  databaseURL: "https://xxx-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* DOM 안전 초기화 */
let dateEl, timeEl, freshEl, innovationEl;
let freshWeekTable, innovationWeekTable;

let reservations = [];
let currentWeekStart = getStartOfWeek(new Date());

/* 🔥 한국 시간(로컬 시간) 기준 YYYY-MM-DD 문자열 반환 함수 */
function getLocalDateString(date) {
  const offset = date.getTimezoneOffset() * 60000;
  const localDate = new Date(date.getTime() - offset);
  return localDate.toISOString().slice(0, 10);
}

/* DOM 로딩 이후 실행 */
document.addEventListener("DOMContentLoaded", () => {
  dateEl = document.getElementById('date');
  timeEl = document.getElementById('time');
  freshEl = document.getElementById('fresh');
  innovationEl = document.getElementById('innovation');

  freshWeekTable = document.getElementById('freshWeekTable');
  innovationWeekTable = document.getElementById('innovationWeekTable');

  // 🔥 UTC 오류 해결: 접속 기기의 로컬 날짜로 설정
  dateEl.value = getLocalDateString(new Date());

  /* Firebase 데이터 연동 */
  db.ref('reservations').on('value', snapshot => {
    const data = snapshot.val();
    reservations = data ? Object.entries(data).map(([k,v]) => ({key:k,...v})) : [];
    renderAll();
  });
});

/* 통합 렌더 */
function renderAll(){
  renderSelectedDate();
  renderWeekTable();
}

/* 예약 추가 */
function addReservation() {
  if(!freshEl.value && !innovationEl.value) {
    alert("예약자 이름을 입력해주세요.");
    return;
  }
  
  // 중복 예약 방지 로직 추가
  const isExist = reservations.find(r => r.date === dateEl.value && r.time === timeEl.value);
  if (isExist) {
    alert("이미 예약된 시간입니다.");
    return;
  }

  db.ref('reservations').push({
    date: dateEl.value,
    time: timeEl.value,
    fresh: freshEl.value,
    innovation: innovationEl.value
  });
  
  // 입력창 초기화
  freshEl.value = '';
  innovationEl.value = '';
}

/* 좌측 당일 일정 렌더 */
function renderSelectedDate() {
  const tbody = document.querySelector('#todayTable tbody');
  if(!tbody) return;
  tbody.innerHTML = '';

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  times.forEach(t => {
    const found = reservations.find(r => r.date === dateEl.value && r.time === t);

    tbody.innerHTML += `
    <tr class="${found?'reserved':''}">
      <td>${t}</td>
      <td>${found?.fresh||''}</td>
      <td>${found?.innovation||''}</td>
      <td>${found?`<button onclick="deleteReservation('${found.key}')">삭제</button>`:''}</td>
    </tr>`;
  });
}

/* 삭제 */
function deleteReservation(key){
  if(confirm("정말 예약을 삭제하시겠습니까?")) {
    db.ref('reservations/'+key).remove();
  }
}

/* 주 시작일 계산 (월요일 기준) */
function getStartOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

/* 주 이동 */
function prevWeek(){
  currentWeekStart.setDate(currentWeekStart.getDate()-7);
  renderWeekTable();
}

function nextWeek(){
  currentWeekStart.setDate(currentWeekStart.getDate()+7);
  renderWeekTable();
}

/* 🔥 해당 월의 몇 주차인지 계산하는 함수 */
function getWeekOfMonth(date) {
  const firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
  const pastDaysOfMonth = date.getDate() - 1;
  return Math.ceil((pastDaysOfMonth + firstDay.getDay() + 1) / 7);
}

/* 우측 주간 테이블 렌더 */
function renderWeekTable() {
  if (!freshWeekTable || !innovationWeekTable) return;

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];
  const days = [];
  
  for(let i=0; i<7; i++){
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate()+i);
    days.push(d);
  }

  // 🔥 주차 계산 개선: 목요일(배열의 인덱스 3)을 기준으로 월과 주차를 판별하고 괄호 안에 전체 날짜 범위 표시
  const repDate = days[3]; 
  document.getElementById('weekLabel').innerText = 
    `${repDate.getMonth()+1}월 ${getWeekOfMonth(repDate)}주차 (${days[0].getMonth()+1}.${days[0].getDate()} ~ ${days[6].getMonth()+1}.${days[6].getDate()})`;

  function createTable(target, type){
    let html = '<tr><th>시간</th>';

    days.forEach(d=>{
      // 요일 표시 추가
      const weekDays = ['일','월','화','수','목','금','토'];
      html += `<th>${d.getDate()}일(${weekDays[d.getDay()]})</th>`;
    });
    html += '</tr>';

    times.forEach(t=>{
      html += `<tr><td>${t}</td>`;

      days.forEach(d=>{
        // 🔥 UTC 오류 해결: 달력 생성 시에도 로컬 타임 적용
        const dateStr = getLocalDateString(d);
        const found = reservations.find(r=>r.date===dateStr && r.time===t);
        const name = found ? (type==='fresh'?found.fresh:found.innovation) : '';

        html += `
        <td class="${found?'reserved':''} tooltip"
            data-tooltip="${dateStr} ${t}"
            onclick="openReservation('${dateStr}','${t}')">
            ${name}
        </td>`;
      });
      html += '</tr>';
    });
    target.innerHTML = html;
  }

  createTable(freshWeekTable,'fresh');
  createTable(innovationWeekTable,'innovation');
}

/* 주간표 칸 클릭 시 예약 */
function openReservation(date,time){
  const existing = reservations.find(r=>r.date===date && r.time===time);

  const fresh = prompt(`[${date} ${time}] Fresh 예약자명`, existing?.fresh||'');
  if(fresh===null) return;

  const innovation = prompt(`[${date} ${time}] Innovation 예약자명`, existing?.innovation||'');
  if(innovation===null) return;

  // 둘 다 비어있으면 삭제로 처리
  if(fresh.trim() === '' && innovation.trim() === '') {
    if(existing) db.ref('reservations/'+existing.key).remove();
    return;
  }

  if(existing){
    db.ref('reservations/'+existing.key).remove();
  }

  db.ref('reservations').push({date,time,fresh,innovation});
}
</script>

</body>
</html>
