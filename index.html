<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아워홈 R&D 회의실 예약 시스템</title>
<style>
    :root { --primary: #e76115; --bg: #f4f7f9; --border: #e0e4e8; }
    body { font-family: 'Malgun Gothic', sans-serif; padding:15px; display:flex; gap:15px; background-color: var(--bg); color: #333; margin: 0; height: 100vh; box-sizing: border-box; }
    
    .left { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
    .right { flex: 3; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }

    button { cursor: pointer; background-color: var(--primary); color: white; border: none; border-radius: 5px; padding: 8px 12px; font-weight: bold; transition: 0.2s; }
    button:hover { opacity: 0.8; }
    input, select { padding: 8px; border: 1px solid #ced4da; border-radius: 5px; font-size: 12px; }

    .room-selector { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #f0f0f0; padding: 8px; border-radius: 8px; }
    .room-selector span { font-size: 16px; font-weight: bold; color: var(--primary); min-width: 100px; text-align: center; }

    .notice-top { font-size: 11px; color: #666; margin: -5px 0 15px; text-align: center; line-height: 1.5; background: #fff5f0; padding: 5px; border-radius: 4px; }

    .view-tabs { 
        display: flex; 
        justify-content: flex-end; 
        gap: 5px; 
        margin-bottom: 10px; 
        align-items: center;  /* 추가된 부분 */
        width: 100%;          /* 추가된 부분 */
    }
    .view-tabs button { background: #ddd; color: #333; font-size: 12px; }
    .view-tabs button.active { background: var(--primary); color: white; }

    /* 2️⃣ 여기에 호버 스타일을 새로 추가하세요 */
    #specialButtons button:hover {
        filter: brightness(90%);
        transition: 0.2s;
    }

    table { border-collapse: collapse; width:100%; table-layout: fixed; background: white; }
    th, td { border: 1px solid var(--border); text-align: center; font-size: 11px;}
    th { background: #f8f9fa; padding: 10px 0; }

    /* 3. [왼쪽] 오늘의 현황 테이블 전용 (#todayTable) */
    #todayTable td { padding: 6px 0;}

    /* 4. [오른쪽] 주간 캘린더 테이블 전용 (#weekTable) */
    #weekTable td {height: 18px;    /* 👈 주간 캘린더는 촘촘하게 높이를 고정 */ padding: 2px 0;  /* 안쪽 여백을 최소화하여 한 화면에 많이 보이게 함 */}
    
    #weekTable td { height: 24px; } 
    .reserved { background-color: #fff9db !important; font-weight: bold; color: #856404; cursor: pointer; }
    .highlight-col { background-color: #fffaf0 !important; border-left: 2px dashed var(--primary) !important; border-right: 2px dashed var(--primary) !important; }
    th.highlight-col { border-top: 2px dashed var(--primary) !important; color: var(--primary); }
    tr:last-child td.highlight-col {border-bottom: 2px dashed var(--primary) !important;}
    
    /* 📅 월간 캘린더 레이아웃 수정 */
    #monthContainer { display:none; flex:1; flex-direction:column; overflow:hidden; border: 1px solid var(--border); background: var(--border); gap: 1px; }
    .month-header-wrapper { display: flex; background: #f8f9fa; width: 100%; }
    .month-header { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; background: #f8f9fa; }
    .month-header div { border-right: 1px solid var(--border); padding: 12px 0; text-align: center; font-size: 12px; font-weight: bold; background: #f8f9fa; }
    .header-spacer { width: 16.5px; background:white; border:none; }

    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; overflow-y: scroll; background: var(--border); gap: 1px; }
    
    /* 개별 날짜 칸 */
    .month-day { 
        background: white; 
        height: 120px;        /* 👈 높이를 110~120px 정도로 고정 (원하는 만큼 조절) */
        padding: 8px; 
        display: flex; 
        flex-direction: column; 
        cursor: pointer; 
        box-sizing: border-box;
        border: 1px solid transparent; 
        overflow-y: auto;     /* 👈 내용이 넘치면 이 칸 안에서만 스크롤 발생 */
    }
    
    /* 💡 스크롤바를 아주 얇고 깔끔하게 만드는 스타일 (추천) */
    .month-day::-webkit-scrollbar {
        width: 4px; /* 스크롤바 두께 */
    }
    
    .month-day::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.1); /* 스크롤바 색상 (연하게) */
        border-radius: 10px;
    }
    
    .month-day::-webkit-scrollbar-track {
        background: transparent; /* 배경은 투명하게 */
    }
    /* 선택된 날짜 강조 (사방 테두리) */
    .month-day.highlight-col { 
        border: 2px dashed var(--primary) !important; 
        background-color: #fffaf0;
        z-index: 2;
    }
    .day-num { font-weight: bold; margin-bottom: 8px; font-size: 13px; }
    .res-item { background: #ffeeba; padding: 2px 5px; border-radius: 3px; font-size: 10px; border-left: 3px solid var(--primary); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .scroll-area { flex: 1; overflow-y: auto; border-bottom: 1px solid var(--border); }
    .other-month { background: #fafafa; color: #ccc; }
    
/* --- 사다리로 추가된 내용--- */
    .ladder-col { position: relative; width: 4px; height: 100%; background-color: #555; }
    .ladder-bridge { position: absolute; height: 4px; width: 100%; background-color: #555; z-index: 1; }

/* --- NEW: 타로 카드 스타일 --- */
    .tarot-card { width: 60px; height: 100px; perspective: 1000px; cursor: pointer; }
    .tarot-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .tarot-card.flipped .tarot-inner { transform: rotateY(180deg); }
    .tarot-front, .tarot-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid #ffd700; }
    .tarot-back { background: #2e2e4e; color: #ffd700; }
/* 기존 스타일에서 .tarot-front 부분만 이렇게 수정하세요 */
    .tarot-front { 
        position: absolute; 
        width: 100%; 
        height: 100%; 
        backface-visibility: hidden; 
        border-radius: 5px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        
        background: white; 
        color: #333; 
        transform: rotateY(180deg); 

        /* --- 추가/수정된 부분 --- */
        overflow: hidden; /* 이미지가 카드 모서리(border-radius) 밖으로 나가지 않게 함 */
        border: 2px solid #ffd700; /* 테두리는 유지 */
    }

    /* 이미지 자체에 대한 스타일을 추가하면 더 깔끔합니다 */
    .tarot-front img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* 카드 비율에 맞춰 이미지를 꽉 채움 */
        display: block;
    }

    /* 🆕 사다리 결과창 전용: 인원이 많아도(최대 9명) 겹치지 않게 크기 자동 조절 */
    #ladderResults .tarot-card { 
        width: 45px;      /* 사다리용은 조금 더 작게 */
        height: 65px;     /* 높이도 비율에 맞춰 축소 */
        margin: 0 auto;   /* 중앙 정렬 */
    }
    
    #ladderResults .tarot-back { 
        font-size: 16px;  /* '?' 글자 크기 조정 */
        background: #e76115; /* 사다리는 아워홈 주황색 포인트로 변경 (선택사항) */
        color: white;
        border-color: #e76115;
    }
    
    #ladderResults .tarot-front { 
        font-size: 13px;  /* '꽝', '통과' 글자 크기 */
        font-weight: bold;
        border-color: #e76115;
        color: #e76115;
    }
    
    /* 사다리 보드 전체 스크롤 허용 (인원이 많아질 때 대비) */
    #ladderBoard {
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 20px;
    }
    
</style>
</head>

                <div style="display: flex; flex-direction: column; gap: 6px;">`;

        item.years.forEach((year, yIdx) => {
            // 날짜 시드와 연도 인덱스를 조합해 매일 다른 문구가 나오도록 계산
            const fortuneIdx = (daySeed + yIdx + item.animal.length) % item.pool.length;
            const fortuneText = item.pool[fortuneIdx];

            cardHtml += `
                <div style="display: flex; font-size: 12px; align-items: flex-start; gap: 5px;">
                    <span style="background: #eee; padding: 1px 4px; border-radius: 3px; font-weight: bold; color: #555; white-space: nowrap;">${year}</span>
                    <span style="color: #333; line-height: 1.4;">${fortuneText}</span>
                </div>`;
        });

        cardHtml += `</div></div>`;
        grid.innerHTML += cardHtml;
    });

    document.getElementById('zodiacModal').style.display = 'block';
}

document.addEventListener("DOMContentLoaded", () => {
    // 1. 초기화 함수들
    initStartT();      
    goToday();         
    syncEndTime();     
    startRealtimeUpdate(); 
    if(typeof cleanupOldData === 'function') cleanupOldData();

    // 2. 입력 감시 로직
    const nameInput = document.getElementById('resName'); 
    const specialButtons = document.getElementById('specialButtons'); 
    const ladderSetup = document.getElementById('ladderSetup');
    const weatherEasterEgg = document.getElementById('weatherEasterEgg');

    if (nameInput) {
        nameInput.addEventListener('input', function() {
            const val = this.value.trim();

            // [추가] "지하철" 입력 시 이스터에그 실행
            if (val === "지하철") {
                if (typeof showSubwayEasterEgg === 'function') {
                    showSubwayEasterEgg();
                    // 실행 후 입력창 초기화 (선택 사항: 원치 않으시면 아래 줄을 지우세요)
                    this.value = ""; 
                }
            } 
            else if (val === "사다리") {

                initLadderGame()
                if (ladderSetup) ladderSetup.style.display = 'block'; 
                if (specialButtons) specialButtons.style.display = 'none';
                if (weatherEasterEgg) weatherEasterEgg.style.display = 'none';
            } 
            else if (val === "날씨") {
                if (weatherEasterEgg) weatherEasterEgg.style.display = 'flex';
                if (ladderSetup) ladderSetup.style.display = 'none';
                if (specialButtons) specialButtons.style.display = 'none';
            }
            else if (["노은영", "고주현", "이동형", "운세"].includes(val)) {
                if (specialButtons) specialButtons.style.display = 'flex';
                if (ladderSetup) ladderSetup.style.display = 'none';
                if (weatherEasterEgg) weatherEasterEgg.style.display = 'none';
            } 
            else {
                if (specialButtons) specialButtons.style.display = 'none';
                if (ladderSetup) ladderSetup.style.display = 'none';
                if (weatherEasterEgg) weatherEasterEgg.style.display = 'none';
                if (document.getElementById('weatherInfo')) {
                    document.getElementById('weatherInfo').style.display = 'none';
                }
            }
        });
    }
});

// 3. 사다리 게임 초기화
function initLadderGame() {
    const memberInput = document.getElementById('memberCount');
    const bombInput = document.getElementById('bombCount');
    if(!memberInput || !bombInput) return;

    const n = parseInt(memberInput.value);
    const m = parseInt(bombInput.value);

    if (n < 2 || n > 9 || m >= n || m < 1) {
        alert("인원 설정을 확인해주세요.");
        return;
    }

    const inputArea = document.getElementById('ladderInputs');
    const lineArea = document.getElementById('ladderLines');
    const resultArea = document.getElementById('ladderResults');
    const ladderBoard = document.getElementById('ladderBoard');
    
    inputArea.innerHTML = '';
    lineArea.innerHTML = '';
    resultArea.innerHTML = '';
    bridgeData = []; 

    if(ladderBoard) { ladderBoard.scrollLeft = 0; }

    let results = new Array(n).fill('통과');

}

// 4. 시작 버튼 클릭
async function startLadder(e, startIdx) {
    const btn = e.target;
    if(btn.disabled) return;
    
    // [추가] 시작 버튼 누르면 모든 숨겨진 가로줄을 보이게 함
    const allBridges = document.querySelectorAll('.ladder-bridge');
    allBridges.forEach(b => b.style.display = 'block');

    btn.disabled = true;
    btn.innerText = "진행중";
    btn.style.background = "#ccc";

    const dot = document.createElement('div');
    dot.style.cssText = `
        position: absolute; width: 12px; height: 12px; background: red; 
        border-radius: 50%; left: 50%; top: 0; transform: translate(-50%, -50%); 
        z-index: 10; transition: all 0.2s linear; box-shadow: 0 0 8px red;
    `;
    document.getElementById(`ladder-col-${startIdx}`).appendChild(dot);

    let currentCol = startIdx;
    let currentTop = 0;

    while (currentTop < 100) {
        const nextBridge = bridgeData.find(b => 
            b.top > currentTop && (b.column === currentCol || b.column === currentCol - 1)
        );

        if (nextBridge) {
            currentTop = nextBridge.top;
            dot.style.top = `${currentTop}%`;
            await new Promise(r => setTimeout(r, 200));

            const isRight = (nextBridge.column === currentCol);
            currentCol = isRight ? currentCol + 1 : currentCol - 1;
            
            const nextColDiv = document.getElementById(`ladder-col-${currentCol}`);
            nextColDiv.appendChild(dot); 
            await new Promise(r => setTimeout(r, 200));
        } else {
            currentTop = 100;
            dot.style.top = `100%`;
            await new Promise(r => setTimeout(r, 200));
        }
    }

    const finalCard = document.getElementById(`res-${currentCol}`);
    if(finalCard) finalCard.classList.add('flipped');
    
    btn.innerText = "완료";
    dot.remove(); 
}

// 5. 가로줄 무작위 생성 (처음엔 숨김 처리)
function generateAllBridges(n) {
    bridgeData = []; 
    for (let i = 0; i < n - 1; i++) {
        const col = document.getElementById(`ladder-col-${i}`);
        const bridgeCount = Math.floor(Math.random() * 2) + 2; 
        
        for (let j = 0; j < bridgeCount; j++) {
            const topPos = Math.floor(Math.random() * 65) + 15; 
            bridgeData.push({ column: i, top: topPos });

            const bridge = document.createElement('div');
            bridge.className = 'ladder-bridge';
            // [중요] 초기 상태를 display: none으로 설정
            bridge.style.cssText = `
                position: absolute; top: ${topPos}%; left: 50%;
                width: 100%; height: 2px; background: #bbb; z-index: 1;
                display: none; 
            `;
            col.appendChild(bridge);
        }
    }
    bridgeData.sort((a, b) => a.top - b.top);
}

// 💡 날짜 로컬 변환 함수 (하루 밀림 방지 핵심)
function getDS(d) {
    const date = new Date(d);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

async function cleanupOldData() {
    const today = new Date();
    const limitDate = new Date(today.setDate(today.getDate() - 30));
    const limitStr = getDS(limitDate);
    const snap = await db.ref('reservations').once('value');
    const data = snap.val();
    if (data) {
        Object.entries(data).forEach(([key, val]) => {
            if (val.date < limitStr) db.ref('reservations/' + key).remove();
        });
    }
}

function getStartOfWeek(d) {
    const dd = new Date(d);
    const day = dd.getDay();
    const diff = dd.getDate() - day + (day === 0 ? -6 : 1); // 월요일 기준
    return new Date(dd.setDate(diff));
}

/* --- 지뢰찾기 게임 관련 변수 및 설정 --- */
let mineBoard = [];      // 지뢰 및 숫자 정보를 담을 배열
let revealedCount = 0;   // 사용자가 연 칸의 개수
const gridSize = 4;      // 4x4 격자 크기
const mineCount = 3;     // 숨겨진 지뢰 개수 (난이도 조절 가능)

/**
 * 지뢰찾기 게임 초기화 및 시작
 */
function initMinesweeper() {
    const boardElement = document.getElementById('gameBoard');
    if (!boardElement) return;

    boardElement.innerHTML = ''; // 기존 보드 초기화
    mineBoard = Array(gridSize * gridSize).fill(0); // 0으로 가득 찬 16칸 생성
    revealedCount = 0; // 카운트 초기화

    // 1. 지뢰(M) 무작위 배치
    let plantedMines = 0;
    while (plantedMines < mineCount) {
        let index = Math.floor(Math.random() * (gridSize * gridSize));
        if (mineBoard[index] !== 'M') {
            mineBoard[index] = 'M';
            plantedMines++;
        }
    }

    // 2. 주변 지뢰 개수 계산 (숫자 채우기)
    for (let i = 0; i < gridSize * gridSize; i++) {
        if (mineBoard[i] === 'M') continue;
        
        let count = 0;
        const r = Math.floor(i / gridSize);
        const c = i % gridSize;

        // 인접한 8개 칸 검사
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                const nr = r + dr;
                const nc = c + dc;
                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    if (mineBoard[nr * gridSize + nc] === 'M') count++;
                }
            }
        }
        mineBoard[i] = count;
    }

    // 3. 화면에 칸 생성 및 이벤트 연결
    mineBoard.forEach((val, idx) => {
        const cell = document.createElement('div');
        // 디자인 설정
        cell.style.cssText = `
            width: 50px; 
            height: 50px; 
            background: #eee; 
            line-height: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            transition: 0.2s; 
            user-select: none;
        `;

        // [우클릭] 깃발 토글 기능
        cell.oncontextmenu = (e) => {
            e.preventDefault(); // 기본 메뉴 안 뜨게 방지
            if (cell.style.background === "rgb(255, 255, 255)") return; // 이미 열린 칸은 무시

            if (cell.innerText === "🚩") {
                cell.innerText = "";
            } else {
                cell.innerText = "🚩";
                cell.style.color = "red";
            }
        };

        // [좌클릭] 칸 열기 기능
        cell.onclick = () => {
            if (cell.innerText === "🚩") return; // 깃발 꽂힌 칸은 클릭 방지
            if (cell.style.background === "rgb(255, 255, 255)") return; // 이미 열린 칸 클릭 무시

            if (val === 'M') {
                // 지뢰를 밟았을 때
                cell.style.background = "#ff6b6b";
                cell.innerText = "💣";
                setTimeout(() => { 
                    alert("펑! 지뢰를 밟았습니다. 다시 도전해보세요!"); 
                    initMinesweeper(); 
                }, 100);
            } else {
                // 안전한 칸을 열었을 때
                cell.style.background = "#fff";
                cell.style.border = "1px solid #ddd";
                cell.innerText = val === 0 ? "" : val;
                
                // 숫자별 색상 지정
                if (val === 1) cell.style.color = "blue";
                else if (val === 2) cell.style.color = "green";
                else if (val >= 3) cell.style.color = "red";
                
                revealedCount++;

                // 승리 조건 체크
                if (revealedCount === (16 - mineCount)) {
                    setTimeout(async () => {
                        alert("🎉 지뢰를 모두 찾았습니다! 예약이 진행됩니다.");
                        
                        if (tempResData) {
                            await commitReservation(tempResData); // 보관했던 데이터로 저장 실행
                            tempResData = null; // 데이터 비우기
                        }
                        
                        closeGame(); // 게임 모달 닫기
                    }, 100);
                }
            }
        };
        boardElement.appendChild(cell);
    });
}

async function showTodayWeather() {
    const weatherInfoDiv = document.getElementById('weatherInfo');
    const weatherListDiv = document.getElementById('weatherList');
    const weekListDiv = document.getElementById('weekList');
    const dateTitle = document.getElementById('currentFullDate');
    
    weatherListDiv.innerHTML = '<div style="grid-column: span 4; font-size:11px; padding: 10px;">데이터 로드 중...</div>';
    weatherInfoDiv.style.display = 'block';

    try {
        const serviceKey = 'c832c8aadcd6effb30c9f15849602d3228c5026dbbf0e33c42b844c3ffafc10c'; 
        const now = new Date();
        
        // --- 하단 제목 날짜 및 요일 업데이트 ---
        const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const fullDateString = `오늘의 날씨 (${now.getMonth() + 1}월 ${now.getDate()}일 ${dayNames[now.getDay()]})`;
        dateTitle.innerText = fullDateString;

        const baseDate = getDS(now).replace(/-/g, ''); 
        const baseTime = '0200'; 

        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${serviceKey}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=60&ny=127`;

        const response = await fetch(url);
        const data = await response.json();
        const items = data.response.body.items.item;

        const dayWeather = {}; // 날짜별 요약
        const timeWeather = {}; // 오늘 시간대별

        items.forEach(item => {
            // 오늘 시간대별 데이터 (06시~21시)
            if (item.fcstDate === baseDate) {
                const hour = item.fcstTime.substring(0, 2) + '시';
                if (!timeWeather[hour]) timeWeather[hour] = {};
                if (item.category === 'TMP') timeWeather[hour].temp = item.fcstValue;
                if (item.category === 'SKY') timeWeather[hour].sky = item.fcstValue;
                if (item.category === 'PTY') timeWeather[hour].pty = item.fcstValue;
            }

            // 향후 3일 데이터 요약 (낮 12시 기온 기준)
            if (item.fcstTime === '1200') {
                if (!dayWeather[item.fcstDate]) dayWeather[item.fcstDate] = {};
                if (item.category === 'TMP') dayWeather[item.fcstDate].temp = item.fcstValue;
                if (item.category === 'SKY') dayWeather[item.fcstDate].sky = item.fcstValue;
                if (item.category === 'PTY') dayWeather[item.fcstDate].pty = item.fcstValue;
            }
        });

        // --- 상단 3일간 날씨 HTML (오늘이 가장 왼쪽) ---
        let weekHtml = '';
        const sortedDates = Object.keys(dayWeather).sort(); // 날짜순 정렬
        
        sortedDates.slice(0, 3).forEach((dateStr, index) => {
            const d = new Date(dateStr.substring(0,4), dateStr.substring(4,6)-1, dateStr.substring(6,8));
            const dayLabel = (index === 0) ? "오늘" : dayNames[d.getDay()].replace('요일','');
            const w = dayWeather[dateStr];
            
            weekHtml += `
                <div style="text-align: center;">
                    <div style="font-size: 11px; font-weight: bold; color: ${index===0?'#339af0':'#666'};">${dayLabel}</div>
                    <div style="font-size: 20px; margin: 2px 0;">${getWeatherIcon(w.sky, w.pty)}</div>
                    <div style="font-size: 12px; font-weight: bold;">${w.temp}°</div>
                </div>`;
        });
        weekListDiv.innerHTML = weekHtml;

        // --- 하단 시간대별 날씨 HTML ---
        let timeHtml = '';
        for (let i = 6; i <= 21; i++) {
            const hourKey = String(i).padStart(2, '0') + '시';
            const w = timeWeather[hourKey];
            if (w) {
                timeHtml += `
                    <div style="padding: 8px 0; border: 1px solid #f1f3f5; border-radius: 6px; background: #fff;">
                        <div style="font-size: 9px; color: #adb5bd;">${hourKey}</div>
                        <div style="font-size: 18px; margin: 2px 0;">${getWeatherIcon(w.sky, w.pty)}</div>
                        <div style="font-weight: bold; font-size: 11px;">${w.temp}°</div>
                    </div>`;
            }
        }
        weatherListDiv.innerHTML = timeHtml;

    } catch (e) {
        weatherListDiv.innerHTML = '<div style="grid-column: span 4; color: red;">날씨 정보를 가져오지 못했습니다.</div>';
    }
}

function getWeatherIcon(sky, pty) {
    if (pty === '1' || pty === '4') return '🌧️'; 
    if (pty === '2') return '🌨️'; 
    if (pty === '3') return '❄️'; 
    if (sky === '3') return '⛅'; 
    if (sky === '4') return '☁️'; 
    return '☀️';
}

// 카카오맵 연동 함수
function goSubwayLink() {
    const start = document.getElementById('st_start').value.trim();
    const end = document.getElementById('st_end').value.trim();

    if(!start || !end) {
        alert("출발역과 도착역을 모두 입력해 주세요!");
        return;
    }

    // 이름 뒤에 '역' 자동 추가 로직
    const sName = start.endsWith('역') ? start : start + '역';
    const eName = end.endsWith('역') ? end : end + '역';

    const url = `https://map.kakao.com/?sName=${encodeURIComponent(sName)}&eName=${encodeURIComponent(eName)}&target=subway`;
    window.open(url, '_blank'); // 새 창으로 조회 결과 팝업
}

    
// 1. 실시간 감시 함수
function startRealtimeUpdate() {
    db.ref('reservations').on('value', (snapshot) => {
        const data = snapshot.val();
        reservations = []; 
        if (data) {
            Object.entries(data).forEach(([key, val]) => {
                reservations.push({ key, ...val });
            });
        }
        render(); 
    });
}
