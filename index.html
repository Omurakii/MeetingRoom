<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아워홈 R&D 회의실 예약 시스템</title>
<style>
    body { font-family: 'Malgun Gothic', sans-serif; padding:15px; display:flex; gap:15px; background-color: #f4f7f9; color: #333; margin: 0; }
    .left { flex:1.2; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); height: fit-content; }
    .right { flex:2.8; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    
    /* 회의실 선택기 스타일 */
    .room-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 8px; }
    .room-selector span { font-size: 18px; font-weight: bold; color: #e76115; min-width: 120px; text-align: center; }
    .nav-btn { cursor: pointer; font-size: 20px; background: none; border: none; color: #666; padding: 0 10px; }
    .nav-btn:hover { color: #e76115; }

    h2 { margin-top: 0; margin-bottom: 5px; color: #1a1a1a; font-size: 1.2rem; text-align: center; }
    .notice { font-size: 11px; color: #666; margin-bottom: 15px; display: block; text-align: center; }
    
    table { border-collapse: collapse; width:100%; margin-top: 5px; table-layout: fixed; background: white; }
    th, td { border: 1px solid #e0e4e8; text-align: center; height: 32px; font-size: 12px; }
    th { background: #f8f9fa; font-weight: 600; }
    
    .highlight-col { border-left: 2px dashed #e76115 !important; border-right: 2px dashed #e76115 !important; background-color: #fffaf0; }
    .reserved { background-color: #fff9db !important; font-weight: bold; color: #856404; cursor: pointer; }
    
    .week-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
    button { cursor: pointer; background-color: #e76115; color: white; border: none; border-radius: 5px; padding: 7px 12px; font-weight: bold; }
    
    input, select { padding: 8px; border: 1px solid #ced4da; border-radius: 5px; font-size: 12px; }
    .btn-delete { background: #ff4d4f; padding: 3px 6px; font-size: 11px; font-weight: normal; }
</style>
</head>
<body>

<div class="left">
  <div class="room-selector">
    <button class="nav-btn" onclick="changeRoom(-1)">◀</button>
    <span id="currentRoomDisplay">Fresh</span>
    <button class="nav-btn" onclick="changeRoom(1)">▶</button>
  </div>
  
  <h2>🏢 회의실 예약</h2>
  <span class="notice">※ 예약 시 설정한 비밀번호로만 삭제 가능합니다.</span>
  
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <input type="date" id="date" style="width: 94%;">
    <div style="display:flex; gap:5px;">
        <select id="startTime" style="flex:1;" onchange="syncEndTime()"></select>
        <select id="endTime" style="flex:1;"></select>
    </div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="userName" placeholder="예약자 성함" style="flex: 1.5;">
        <input type="password" id="userPw" placeholder="비번(4자리)" maxlength="4" style="flex: 1;">
    </div>
    <button onclick="addReservation()" style="width: 100%; padding: 10px;">예약하기</button>
  </div>
  
  <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
  <h3 style="font-size:14px;">📅 <span id="roomSubTitle"></span> 현황 (<span id="selectedDateDisplay"></span>)</h3>
  <div style="max-height: 400px; overflow-y: auto;">
      <table id="todayTable">
        <thead>
          <tr>
            <th style="width:60px;">시간</th>
            <th>예약자</th>
            <th style="width:50px;">관리</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
  </div>
</div>

<div class="right">
  <div class="week-nav">
    <button onclick="prevWeek()">◀ 이전 주</button>
    <h3 id="weekLabel" style="margin:0; min-width:150px; text-align:center;"></h3>
    <button onclick="nextWeek()">다음 주 ▶</button>
  </div>
  <h4 id="weekTableTitle" style="margin:10px 0; color:#e76115;"></h4>
  <table id="weekTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCenJeE0f4-7SuAD-BHwqy3st0Y2LcAHjg",
  authDomain: "meeting-room-9382e.firebaseapp.com",
  databaseURL: "https://meeting-room-9382e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-room-9382e",
  storageBucket: "meeting-room-9382e.firebasestorage.app",
  messagingSenderId: "443110031923",
  appId: "1:443110031923:web:9e3154876e475fc9225946",
  measurementId: "G-XRQPQCVZQ1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ROOMS = ["Fresh", "Innovation", "Healthy"];
let roomIdx = 0;
const TIME_SLOTS = [];
for (let h = 8; h <= 17; h++) {
    for (let m of ["00", "30"]) {
        if (h === 8 && m === "00") continue;
        TIME_SLOTS.push(`${String(h).padStart(2, '0')}:${m}`);
    }
}

let reservations = [];
let currentWeekStart = getStartOfWeek(new Date());

const el = {
    date: document.getElementById('date'),
    startTime: document.getElementById('startTime'),
    endTime: document.getElementById('endTime'),
    userName: document.getElementById('userName'),
    userPw: document.getElementById('userPw'),
    roomDisplay: document.getElementById('currentRoomDisplay'),
    weekTable: document.getElementById('weekTable'),
    todayTbody: document.querySelector('#todayTable tbody'),
    weekLabel: document.getElementById('weekLabel'),
    dateDisplay: document.getElementById('selectedDateDisplay'),
    roomSubTitle: document.getElementById('roomSubTitle'),
    weekTableTitle: document.getElementById('weekTableTitle')
};

document.addEventListener("DOMContentLoaded", () => {
    TIME_SLOTS.slice(0, -1).forEach(t => {
        let opt = document.createElement('option');
        opt.value = t; opt.innerText = t;
        el.startTime.appendChild(opt);
    });
    syncEndTime();
    const todayStr = getLocalDateString(new Date());
    el.date.value = todayStr;
    el.dateDisplay.innerText = todayStr;
    
    el.date.onchange = () => {
        el.dateDisplay.innerText = el.date.value;
        currentWeekStart = getStartOfWeek(new Date(el.date.value));
        renderAll();
    };

    db.ref('reservations').on('value', snapshot => {
        const data = snapshot.val();
        reservations = data ? Object.entries(data).map(([k, v]) => ({ key: k, ...v })) : [];
        renderAll(); 
    });
});

function changeRoom(dir) {
    roomIdx = (roomIdx + dir + ROOMS.length) % ROOMS.length;
    renderAll();
}

function syncEndTime() {
    const startVal = el.startTime.value;
    const startIdx = TIME_SLOTS.indexOf(startVal);
    el.endTime.innerHTML = "";
    TIME_SLOTS.slice(startIdx + 1).forEach(t => {
        let opt = document.createElement('option');
        opt.value = t; opt.innerText = t;
        el.endTime.appendChild(opt);
    });
}

function getLocalDateString(date) {
    const d = new Date(date);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function getStartOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    monday.setHours(0,0,0,0);
    return monday;
}

function renderAll() {
    const roomName = ROOMS[roomIdx];
    el.roomDisplay.innerText = roomName;
    el.roomSubTitle.innerText = roomName;
    el.weekTableTitle.innerText = `📍 ${roomName} 회의실 주간 일정`;
    
    renderSelectedDate(roomName);
    renderWeekTable(roomName);
}

function renderSelectedDate(roomName) {
    el.todayTbody.innerHTML = '';
    TIME_SLOTS.slice(0, -1).forEach(t => {
        const found = reservations.find(r => r.date === el.date.value && r.time === t && r.room === roomName);
        const tr = document.createElement('tr');
        const name = found?.name || '';
        tr.innerHTML = `
            <td style="background:#f9f9f9; font-weight:bold;">${t}</td>
            <td class="${name ? 'reserved' : ''}">${name}</td>
            <td>${name ? `<button class="btn-delete" onclick="handleDelete('${found.key}')">삭제</button>` : ''}</td>
        `;
        el.todayTbody.appendChild(tr);
    });
}

async function addReservation() {
    const room = ROOMS[roomIdx];
    const date = el.date.value;
    const startT = el.startTime.value;
    const endT = el.endTime.value;
    const name = el.userName.value.trim();
    const pw = el.userPw.value.trim();

    if (!name || pw.length < 4) return alert("성함과 비밀번호 4자리를 모두 입력해주세요.");
    
    const startIdx = TIME_SLOTS.indexOf(startT);
    const endIdx = TIME_SLOTS.indexOf(endT);
    const targetSlots = TIME_SLOTS.slice(startIdx, endIdx);
    const gid = Date.now(); 

    for (let t of targetSlots) {
        if (reservations.find(r => r.date === date && r.time === t && r.room === room)) {
            alert(`이미 예약된 시간대가 포함되어 있습니다. (${t})`);
            return;
        }
    }

    for (let t of targetSlots) {
        await db.ref('reservations').push({ room, date, time: t, name, pw, gid });
    }
    el.userName.value = ''; el.userPw.value = ''; alert("예약 완료!");
}

async function handleDelete(key) {
    const target = reservations.find(r => r.key === key);
    if (!target) return;

    const inputPw = prompt("예약 시 설정한 비밀번호 4자리를 입력하세요.");
    if (inputPw !== target.pw) return alert("비밀번호가 일치하지 않습니다.");

    const related = reservations.filter(r => r.gid === target.gid && r.room === target.room);
    const msg = related.length > 1 ? "연결된 모든 예약을 일괄 취소하시겠습니까?" : "해당 예약을 취소하시겠습니까?";
    
    if (!confirm(msg)) return;

    for (let item of related) {
        await db.ref('reservations/' + item.key).remove();
    }
    alert("삭제되었습니다.");
}

function renderWeekTable(roomName) {
    const weekDays = ['일','월','화','수','목','금','토'];
    const days = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        days.push(d);
    }
    el.weekLabel.innerText = `${days[0].getMonth()+1}.${days[0].getDate()} ~ ${days[6].getMonth()+1}.${days[6].getDate()}`;
    
    let html = `<thead><tr><th style="width:60px;">시간</th>`;
    days.forEach(d => {
        const isSel = getLocalDateString(d) === el.date.value;
        html += `<th class="${isSel ? 'highlight-col' : ''}">${d.getDate()}(${weekDays[d.getDay()]})</th>`;
    });
    html += `</tr></thead><tbody>`;

    TIME_SLOTS.slice(0, -1).forEach(t => {
        html += `<tr><td style="background:#f8f9fa; font-weight:bold;">${t}</td>`;
        days.forEach(d => {
            const dateStr = getLocalDateString(d);
            const isSel = dateStr === el.date.value;
            const found = reservations.find(r => r.date === dateStr && r.time === t && r.room === roomName);
            html += `<td class="${found ? 'reserved' : ''} ${isSel ? 'highlight-col' : ''}" onclick="${found ? `handleDelete('${found.key}')` : ''}">${found ? found.name : ''}</td>`;
        });
        html += `</tr>`;
    });
    el.weekTable.innerHTML = html + `</tbody>`;
}

function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderAll(); }
function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderAll(); }
</script>
</body>
</html>
