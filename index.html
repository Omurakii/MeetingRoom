<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의실 예약</title>

<style>
body { font-family: Arial; padding:20px; display:flex; gap:20px; }
.left { flex:2; }
.right { flex:1; }

/* 공통 테이블 */
table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; text-align:center; }

/* 좌측 테이블 */
.left th, .left td { padding:8px; }
th { background:#f0f0f0; }

/* 예약 표시 */
.reserved {
  background:#ffe58a;
  font-weight:bold;
}

/* 클릭 */
td { cursor:pointer; }

/* 🔥 핵심: 우측 테이블 정렬 */
.right table {
  table-layout: fixed;
  width:100%;
  font-size:11px;
}

.right th, .right td {
  padding:2px;
  height:24px;
  overflow:hidden;
  white-space:nowrap;
}

/* 시간 열 */
.right th:first-child,
.right td:first-child {
  width:50px;
  font-size:10px;
}

/* 날짜 열 균등 */
.right th:not(:first-child),
.right td:not(:first-child) {
  width: calc((100% - 50px) / 7);
}

/* 헤더 줄바꿈 */
.right th {
  font-size:10px;
  line-height:1.2;
}

/* 툴팁 */
.tooltip { position:relative; }

.tooltip:hover::after {
  content: attr(data-tooltip);
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:5px 8px;
  border-radius:5px;
  font-size:11px;
  white-space:nowrap;
  z-index:10;
}

input, select, button { padding:6px; margin:4px; }

</style>
</head>

<body>

<div class="left">
<h2>📅 회의실 예약 (공유)</h2>

<label>날짜: <input type="date" id="date"></label>

<label>시간:
<select id="time">
<option>08:30</option><option>09:30</option><option>10:30</option>
<option>11:30</option><option>12:30</option><option>13:30</option>
<option>14:30</option><option>15:30</option><option>16:30</option>
</select>
</label>

<label>Fresh: <input type="text" id="fresh"></label>
<label>Innovation: <input type="text" id="innovation"></label>

<button onclick="addReservation()">예약</button>

<h3>📌 선택한 날짜 예약</h3>
<table id="todayTable">
<thead>
<tr><th>시간</th><th>Fresh</th><th>Innovation</th><th>관리</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="right">
<h3>
<button onclick="prevWeek()">◀</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">▶</button>
</h3>

<h4>Fresh</h4>
<table id="freshWeekTable"></table>

<h4>Innovation</h4>
<table id="innovationWeekTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "...",
  databaseURL: "...",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let reservations = [];

// 오늘 날짜
window.onload = () => {
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
};

// 예약
function addReservation() {
  const date = dateEl.value;
  const time = timeEl.value;
  const fresh = freshEl.value;
  const innovation = innovationEl.value;

  db.ref('reservations').push({ date, time, fresh, innovation });
}

// Firebase
db.ref('reservations').on('value', snapshot => {
  const data = snapshot.val();
  reservations = data ? Object.entries(data).map(([k,v]) => ({key:k,...v})) : [];

  renderSelectedDate();
  renderWeekTable();
});

document.getElementById('date').addEventListener('change', renderSelectedDate);

// 좌측
function renderSelectedDate() {
  const selectedDate = dateEl.value;
  const tbody = document.querySelector('#todayTable tbody');
  tbody.innerHTML = '';

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  times.forEach(t => {
    const found = reservations.find(r => r.date === selectedDate && r.time === t);

    tbody.innerHTML += `
    <tr class="${found?'reserved':''}">
      <td>${t}</td>
      <td>${found?.fresh||''}</td>
      <td>${found?.innovation||''}</td>
      <td>${found?`<button onclick="deleteReservation('${found.key}')">삭제</button>`:''}</td>
    </tr>`;
  });
}

// 삭제
function deleteReservation(key) {
  if(confirm("삭제하시겠습니까?")) {
    db.ref('reservations/' + key).remove();
  }
}

// ===== 주간 =====

let currentWeekStart = getStartOfWeek(new Date());

function getStartOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function prevWeek() {
  currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  renderWeekTable();
}

function nextWeek() {
  currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  renderWeekTable();
}

function renderWeekTable() {
  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  document.getElementById('weekLabel').innerText =
    `${days[0].getMonth()+1}월 ${Math.ceil(days[0].getDate()/7)}주`;

  function createTable(table, type) {
    let html = '<tr><th>시간</th>';

    days.forEach(d => {
      html += `<th>${d.getDate()}일</th>`;
    });

    html += '</tr>';

    times.forEach(t => {
      html += `<tr><td>${t}</td>`;

      days.forEach(d => {
        const dateStr = d.toISOString().slice(0,10);
        const found = reservations.find(r => r.date === dateStr && r.time === t);

        let value = found ? (type==='fresh'?found.fresh:found.innovation) : '';
        let tooltip = found ? `${dateStr} ${t}` : '';

        html += `
        <td class="${found?'reserved':''} tooltip"
            data-tooltip="${tooltip}"
            onclick="openReservationModal('${dateStr}','${t}')">
            ${value}
        </td>`;
      });

      html += '</tr>';
    });

    table.innerHTML = html;
  }

  createTable(freshWeekTable,'fresh');
  createTable(innovationWeekTable,'innovation');
}

// 클릭
function openReservationModal(date,time){
  const existing = reservations.find(r => r.date===date && r.time===time);

  let fresh = prompt("Fresh", existing?.fresh||'');
  if(fresh===null) return;

  let innovation = prompt("Innovation", existing?.innovation||'');
  if(innovation===null) return;

  if(existing){
    db.ref('reservations/'+existing.key).remove();
  }

  db.ref('reservations').push({date,time,fresh,innovation});
}
</script>

</body>
</html>
