<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의실 예약</title>

<style>
body { font-family: Arial; padding:20px; display:flex; gap:20px; }
.left { flex:2; }
.right { flex:1; }

table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

/* 동일 너비 */
th:nth-child(2), th:nth-child(3),
td:nth-child(2), td:nth-child(3) {
  width:160px;
}

th { background:#f0f0f0; }

input, select, button { padding:6px; margin:4px; }

/* 예약 표시 */
.reserved {
  background:#ffe58a;
  font-weight:bold;
}

/* 클릭 가능 */
td { cursor:pointer; }

/* 툴팁 */
.tooltip { position:relative; }

.tooltip:hover::after {
  content: attr(data-tooltip);
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  white-space:nowrap;
  font-size:12px;
  z-index:10;
}

.right table td { height:40px; }
.right table th { background:#fafafa; }

</style>
</head>

<body>

<div class="left">
<h2>📅 회의실 예약 (공유)</h2>

<label>날짜: <input type="date" id="date"></label>

<label>시간:
<select id="time">
<option>08:30</option><option>09:30</option><option>10:30</option>
<option>11:30</option><option>12:30</option><option>13:30</option>
<option>14:30</option><option>15:30</option><option>16:30</option>
</select>
</label>

<label>Fresh: <input type="text" id="fresh"></label>
<label>Innovation: <input type="text" id="innovation"></label>

<button onclick="addReservation()">예약</button>

<h3>📌 선택한 날짜 예약</h3>
<table id="todayTable">
<thead>
<tr><th>시간</th><th>Fresh</th><th>Innovation</th><th>관리</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="right">
<h3>
<button onclick="prevWeek()">◀</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">▶</button>
</h3>

<h4>Fresh</h4>
<table id="freshWeekTable"></table>

<h4>Innovation</h4>
<table id="innovationWeekTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCenJeE0f4-7SuAD-BHwqy3st0Y2LcAHjg",
  authDomain: "meeting-room-9382e.firebaseapp.com",
  databaseURL: "https://meeting-room-9382e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-room-9382e",
  storageBucket: "meeting-room-9382e.firebasestorage.app",
  messagingSenderId: "443110031923",
  appId: "1:443110031923:web:9e3154876e475fc9225946"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let reservations = [];

// 오늘 날짜
window.onload = () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('date').value = today;
};

// 예약 추가 (중복 방지)
function addReservation() {
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const fresh = document.getElementById('fresh').value;
  const innovation = document.getElementById('innovation').value;

  if(!date) return alert('날짜 선택');

  db.ref('reservations')
    .orderByChild('date')
    .equalTo(date)
    .once('value', snapshot => {

      const data = snapshot.val();

      if (data) {
        const exists = Object.values(data).find(r => r.time === time);
        if (exists) {
          alert('이미 예약된 시간입니다!');
          return;
        }
      }

      db.ref('reservations').push({ date, time, fresh, innovation });
    });
}

// 삭제
function deleteReservation(key) {
  const ok = confirm("해당 시간에 예약한 분이 맞으신가요?\n\n확인 = 삭제 / 취소 = 유지");
  if (!ok) return;
  db.ref('reservations/' + key).remove();
}

// Firebase
db.ref('reservations').on('value', snapshot => {
  const data = snapshot.val();

  if (!data) {
    reservations = [];
  } else {
    reservations = Object.entries(data).map(([key, value]) => ({
      key,
      ...value
    }));
  }

  renderSelectedDate();
  renderWeekTable();
});

// 날짜 변경
document.getElementById('date').addEventListener('change', renderSelectedDate);

// 선택 날짜 테이블
function renderSelectedDate() {
  const selectedDate = document.getElementById('date').value;
  const tbody = document.querySelector('#todayTable tbody');
  tbody.innerHTML = '';

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  times.forEach(t => {
    const found = reservations.find(r => r.date === selectedDate && r.time === t);

    const row = document.createElement('tr');
    if(found) row.classList.add('reserved');

    row.innerHTML = `
      <td>${t}</td>
      <td>${found?.fresh || ''}</td>
      <td>${found?.innovation || ''}</td>
      <td>${found ? `<button onclick="deleteReservation('${found.key}')">삭제</button>` : ''}</td>
    `;

    tbody.appendChild(row);
  });
}

// ===== 주간 기능 =====

let currentWeekStart = getStartOfWeek(new Date());

function getStartOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function prevWeek() {
  currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  renderWeekTable();
}

function nextWeek() {
  currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  renderWeekTable();
}

function renderWeekTable() {
  const freshTable = document.getElementById('freshWeekTable');
  const innovationTable = document.getElementById('innovationWeekTable');

  const times = ["08:30","09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30"];

  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const month = days[0].getMonth() + 1;
  const weekNum = Math.ceil(days[0].getDate() / 7);
  document.getElementById('weekLabel').innerText = `${month}월 ${weekNum}주`;

  function createTable(table, type) {
    let html = '<tr><th>시간</th>';

    days.forEach(d => {
      html += `<th>${d.getDate()}일</th>`;
    });

    html += '</tr>';

    times.forEach(t => {
      html += `<tr><td>${t}</td>`;

      days.forEach(d => {
        const dateStr = d.toISOString().slice(0,10);
        const found = reservations.find(r => r.date === dateStr && r.time === t);

        let value = '';
        let className = '';
        let tooltip = '';

        if(found) {
          value = type === 'fresh' ? found.fresh : found.innovation;
          if(value) className = 'reserved';

          tooltip = `날짜:${dateStr} | 시간:${t} | Fresh:${found.fresh || '-'} | Innovation:${found.innovation || '-'}`;
        }

        html += `
        <td class="${className} tooltip"
            data-tooltip="${tooltip}"
            onclick="openReservationModal('${dateStr}','${t}')">
            ${value || ''}
        </td>`;
      });

      html += '</tr>';
    });

    table.innerHTML = html;
  }

  createTable(freshTable, 'fresh');
  createTable(innovationTable, 'innovation');
}

// 클릭 → 예약/수정/삭제
function openReservationModal(date, time) {
  const existing = reservations.find(r => r.date === date && r.time === time);

  let fresh = existing?.fresh || '';
  let innovation = existing?.innovation || '';

  const action = prompt(
`[${date} ${time}]
1 → 예약/수정
2 → 삭제`
  );

  if (!action) return;

  if (action === '2') {
    if (!existing) return alert('삭제할 예약 없음');
    if (!confirm('삭제하시겠습니까?')) return;

    db.ref('reservations/' + existing.key).remove();
    return;
  }

  fresh = prompt('Fresh', fresh);
  if (fresh === null) return;

  innovation = prompt('Innovation', innovation);
  if (innovation === null) return;

  if (existing) {
    db.ref('reservations/' + existing.key).remove();
  }

  db.ref('reservations').push({ date, time, fresh, innovation });
}
</script>

</body>
</html>
